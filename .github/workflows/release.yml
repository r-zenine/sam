name: Release

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always

jobs:
  build-linux:
    name: Build Linux
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Rust toolchain
      uses: dtolnay/rust-toolchain@stable
      with:
        components: rustfmt, clippy

    - name: Install system dependencies
      run: |
        sudo apt update
        sudo apt install -y clang

    - name: Cache cargo registry
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
        key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
        restore-keys: |
          ${{ runner.os }}-cargo-

    - name: Install cargo-deb
      run: cargo install cargo-deb

    - name: Build and package for Linux
      run: |
        make package_linux
        make package_debian

    - name: Upload Linux artifacts
      uses: actions/upload-artifact@v4
      with:
        name: linux-artifacts
        path: |
          target/release/sam_linux_x86_64_*.tar.gz
          target/debian/*.deb
        retention-days: 1

  build-macos:
    name: Build macOS (aarch64 + x86_64 cross-compile)
    runs-on: macos-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Rust toolchain
      uses: dtolnay/rust-toolchain@stable
      with:
        components: rustfmt, clippy
        targets: x86_64-apple-darwin

    - name: Cache cargo registry
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
        key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
        restore-keys: |
          ${{ runner.os }}-cargo-

    - name: Build and package for macOS aarch64
      run: make package_macos

    - name: Build and package for macOS x86_64 (cross-compile)
      run: make package_macos_x86

    - name: Upload macOS aarch64 artifacts
      uses: actions/upload-artifact@v4
      with:
        name: macos-aarch64-artifacts
        path: target/release/sam_macos_aarch64_*.tar.gz
        retention-days: 1

    - name: Upload macOS x86_64 artifacts
      uses: actions/upload-artifact@v4
      with:
        name: macos-x86-artifacts
        path: target/release/sam_macos_x86_64_*.tar.gz
        retention-days: 1

  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [build-linux, build-macos]

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Download Linux artifacts
      uses: actions/download-artifact@v4
      with:
        name: linux-artifacts
        path: ./artifacts/

    - name: Download macOS x86_64 artifacts
      uses: actions/download-artifact@v4
      with:
        name: macos-x86-artifacts
        path: ./artifacts/

    - name: Download macOS aarch64 artifacts
      uses: actions/download-artifact@v4
      with:
        name: macos-aarch64-artifacts
        path: ./artifacts/

    - name: Get version from tag
      id: version
      run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        name: Release ${{ steps.version.outputs.VERSION }}
        tag_name: ${{ steps.version.outputs.VERSION }}
        files: |
          artifacts/sam_linux_x86_64_*.tar.gz
          artifacts/sam_macos_x86_64_*.tar.gz
          artifacts/sam_macos_aarch64_*.tar.gz
          artifacts/*.deb
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-packages:
    name: Publish Packages
    runs-on: ubuntu-latest
    needs: create-release

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Download macOS x86_64 artifacts
      uses: actions/download-artifact@v4
      with:
        name: macos-x86-artifacts
        path: ./target/release/

    - name: Download macOS aarch64 artifacts
      uses: actions/download-artifact@v4
      with:
        name: macos-aarch64-artifacts
        path: ./target/release/

    - name: Install system dependencies
      run: |
        sudo apt update
        sudo apt install -y gettext-base

    - name: Setup Git for homebrew publishing
      run: |
        git config --global user.email "r.zenine@gmail.com"
        git config --global user.name "Ryad ZENINE"

    - name: Setup SSH key for homebrew repository
      uses: webfactory/ssh-agent@v0.9.0
      with:
        ssh-private-key: ${{ secrets.HOMEBREW_SSH_KEY }}

    - name: Publish packages
      run: ./.packaging/package_all.sh
      env:
        SNAPCRAFT_STORE_CREDENTIALS: ${{ secrets.SNAPCRAFT_STORE_CREDENTIALS }}

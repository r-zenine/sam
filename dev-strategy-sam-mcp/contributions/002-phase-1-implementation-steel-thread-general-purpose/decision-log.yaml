decisions:
  - id: D001
    title: schemars 1.x instead of 0.8
    status: decided
    context: rmcp 1.2.0 depends on schemars 1.x. The roadmap specified schemars 0.8 but this causes a version conflict.
    decision: Use schemars = "1" in sam-mcp/Cargo.toml
    consequences: schemars 1.x JsonSchema derive works identically for our use case

  - id: D002
    title: transport-io feature required for stdio()
    status: decided
    context: rmcp gates stdio() behind the transport-io feature flag. The roadmap listed only "server" and "macros".
    decision: Add "transport-io" to rmcp features
    consequences: Binary slightly larger but no functional change

  - id: D003
    title: tool_router + tool_handler macros replace tool(tool_box)
    status: decided
    context: The roadmap's #[tool(tool_box)] attribute does not exist in rmcp 1.2.0. The actual macro pattern is #[tool_router] on the impl block + #[tool_handler] on impl ServerHandler.
    decision: Use #[tool_router] / #[tool_handler] / #[tool] macros per rmcp 1.2.0 docs
    consequences: Requires a tool_router field in SamMcpServer struct; initialized via Self::tool_router()

  - id: D004
    title: Parameters<T> instead of #[tool(aggr)]
    status: decided
    context: The roadmap's #[tool(aggr)] attribute does not exist. rmcp uses Parameters<T> as a newtype wrapper to extract all JSON params into a single struct.
    decision: Use Parameters<ListAliasesRequest> in function signature, destructured as Parameters(req)
    consequences: ListAliasesRequest must derive Default (all fields are Option, so Default is trivial)

  - id: D005
    title: SamContext stores cache as Box<dyn VarsCache + Send + Sync>
    status: decided
    context: SamMcpServer is Arc-shared across Tokio tasks so its fields must be Send + Sync. VarsCache trait lacks those bounds; the concrete types (RustBreakCache, NoopVarsCache) are Send + Sync.
    decision: Store cache as Box<dyn VarsCache + Send + Sync>
    consequences: Slightly more indirection; avoids making VarsCache Send+Sync in sam-persistence (which would be a broader change)

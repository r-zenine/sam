decisions:

  - id: DEC-001
    title: New workspace crate `sam-mcp` (not a subcommand of sam-cli)
    status: accepted
    rationale: >
      A standalone binary is the correct MCP deployment unit — MCP clients spawn it as a subprocess
      over stdio. Embedding in sam-cli would require the TUI dependency (sam-tui) and complicate
      the async boundary. A new crate keeps concerns clean and the binary stays minimal.
    alternatives_considered:
      - "Add `sam mcp` subcommand to sam-cli: rejected — sam-cli is sync + TUI-heavy; adds complexity"
    consequence: >
      AppSettings must be accessible from sam-mcp. Either re-export from sam-cli (creates coupling)
      or extract config logic into a shared crate. Decision: extract AppSettings to a new
      `sam-config` crate consumed by both sam-cli and sam-mcp. (Phase 1 task.)

  - id: DEC-002
    title: MCP SDK — rmcp v1.2.0
    status: accepted
    rationale: >
      Official SDK (MCP org), 5.1M downloads, 41 releases, full spec compliance, stdio + HTTP,
      proc-macro tool registration, tokio-native. The clear production choice.
    alternatives_considered:
      - "rust-mcp-sdk v0.8.3: community SDK, pre-1.0, good HTTP infra but overkill for stdio-only"
      - "tower-mcp v0.8.4: best if already in axum stack; more boilerplate for our case"
      - "mcp-attr: most ergonomic macros but stdio-only and too early-stage (v0.0.7)"

  - id: DEC-003
    title: Transport — stdio only
    status: accepted
    rationale: >
      stdio is the universal MCP transport. All major MCP clients (Claude Desktop, Cursor,
      Continue, Zed) support it natively. HTTP/SSE adds infrastructure complexity with no
      benefit for a local developer tool. Can be added later with rmcp's StreamableHttpService.
    consequence: The server is invoked as a child process, not a long-running daemon.

  - id: DEC-004
    title: Execution model — return resolved command string, do not execute
    status: accepted
    rationale: >
      The agent decides whether and how to run the command (in a terminal, via bash, etc.).
      Execution inside the MCP server would require managing stdout/stderr streaming,
      exit codes, and process lifecycle — out of scope and against the principle of least
      authority for an MCP tool.

  - id: DEC-005
    title: Variable resolution — cache-first, live fallback
    status: accepted
    rationale: >
      Matches the behaviour the human user experiences in the TUI. The cache already has TTL
      semantics (RustBreakCache with AssociativeStateWithTTL). Running from_command live when
      the cache is cold ensures the agent always gets real choices.
    consequence: >
      from_command execution inside an async context requires spawn_blocking (sync process::Command
      → blocking). The cache read/write is also blocking (rustbreak). Both wrapped in spawn_blocking.

  - id: DEC-006
    title: Scope — read-only (no alias/var mutation via MCP)
    status: accepted
    rationale: >
      Mutations to YAML config files are a destructive, hard-to-review operation for an agent.
      The value of sam-mcp is letting agents consume the human's curated configuration,
      not replicate or modify it. Can be revisited post-MVP.

  - id: DEC-009
    title: Dedicated `list_aliases` discovery tool with namespace + keyword filters
    status: accepted
    rationale: >
      Discovery and resolution are distinct agent intents. A dedicated list tool lets the agent
      explore and find the right alias before committing to resolution. Filters on namespace and
      keyword (matched against name + desc) keep the response focused — useful when a SAM config
      has many aliases across many namespaces. Filtering is server-side and cheap (alias count
      is always small; no index needed).
    alternatives_considered:
      - "Fold listing into resolve_alias as a null-alias state: rejected — conflates two intents,
        makes the resolve_alias tool description harder for the LLM to understand"
    consequence: >
      Two tools total: list_aliases (discovery) + resolve_alias (state machine).
      list_aliases is the steel thread for Phase 1 since it has no cache or shell deps.

  - id: DEC-011
    title: Single `resolve_alias` tool — state machine design
    status: accepted
    rationale: >
      MCP does not support server-initiated back-and-forth during a single tool call.
      Tools are single request-response. The natural MCP pattern for iterative workflows
      is agent-driven: the tool returns partial state, the agent loops.
      A single stateful tool replaces four separate tools (list_aliases, get_alias,
      get_var_choices, resolve_alias) and produces a cleaner agent UX — one variable
      revealed per call, in dependency order, until resolution is complete.
      No server-side session state needed: each call is self-contained given the
      (alias, vars_so_far) input tuple.
    alternatives_considered:
      - "MCP sampling/createMessage: server asks LLM mid-call; poorly supported by clients"
      - "MCP elicitation (2025-03 spec): server asks human user, not the model — wrong primitive"
      - "Four separate tools: more API surface, agent must know which to call and in what order"
    consequence: >
      The tool description string must clearly explain the state machine contract to the LLM
      so it knows to loop until status=resolved.

  - id: DEC-007
    title: AppSettings extraction — new `sam-config` crate
    status: proposed
    rationale: >
      sam-mcp needs AppSettings to locate aliases_files, vars_files, cache_dir, and ttl.
      Currently AppSettings lives in sam-cli/src/config.rs (a private module of the binary).
      Rather than making sam-mcp depend on sam-cli (pulling in TUI, clap, etc.), extract
      AppSettings + its error types into a new `sam-config` crate that both sam-cli and sam-mcp
      can depend on. Minimal refactor: move the file, update Cargo.tomls.
    alternatives_considered:
      - "Duplicate config loading in sam-mcp: rejected — divergence risk"
      - "Depend on sam-cli from sam-mcp: rejected — transitive deps include TUI and terminal crates"

  - id: DEC-008
    title: Implementation strategy — Steel Thread
    status: accepted
    rationale: >
      Building one full vertical slice (list_aliases end-to-end: config load → alias repo →
      MCP response) before adding other tools validates that rmcp integrates correctly with
      the existing sync sam-core code, the async boundary works, and the MCP client can
      discover and invoke the server. Cheaper to discover integration issues early.

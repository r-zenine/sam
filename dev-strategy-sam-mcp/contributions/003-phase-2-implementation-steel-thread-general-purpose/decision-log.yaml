decisions:
  - id: D001
    type: implementation
    decision: Implement McpResolver by reusing ShellCommand + read_choices + VarsCache from sam-terminals/sam-readers, mirroring UserInterfaceV2 rather than writing custom shell execution.
    rationale: The CLI already has correct, tested infrastructure for running dynamic var commands (env var substitution, caching, output parsing). Duplicating it would diverge over time and miss edge cases (e.g. envsubst for ${VAR} syntax in commands).
    alternatives_rejected:
      - alternative: Custom std::process::Command + manual line-by-line stdout parsing
        reason: Reinvents ShellCommand's env-var substitution and read_choices YAML/plain-text parsing; rejected after user feedback
    impact: sam-terminals added as a dependency; resolver.rs is ~80 lines closely parallel to UserInterfaceV2

  - id: D002
    type: implementation
    decision: Use choice_for_var from sam_core::algorithms as the per-var dispatch function inside the MCP state machine loop.
    rationale: choice_for_var already handles the static/dynamic/input branching and command substitution. There is no value in reimplementing this logic.
    alternatives_rejected:
      - alternative: Manually branch on var.is_command() / var.is_input() / else in the handler
        reason: Duplicates logic already in choice_for_var; adds maintenance surface
    impact: resolve_alias handler is a simple loop over exec_seq calling choice_for_var; the Resolver trait handles all dispatch

  - id: D003
    type: implementation
    decision: Signal input vars by having McpResolver::resolve_input return Err(NoInputWasProvided(_, prompt)), then pattern-match this error in the handler to emit kind="input".
    rationale: The Resolver trait has no success path for "ask user for input and stop" — it's designed for synchronous resolution. Using the existing NoInputWasProvided error variant encodes the prompt without adding new types.
    alternatives_rejected:
      - alternative: Add a new error variant or return type to Resolver
        reason: Would require modifying sam-core, broader change than needed
    impact: Handler matches on ErrorDependencyResolution::NoChoiceForVar { error: ErrorsResolver::NoInputWasProvided(_, prompt) } to detect input vars

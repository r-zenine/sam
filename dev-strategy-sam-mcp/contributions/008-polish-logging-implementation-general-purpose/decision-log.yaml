decisions:
  - id: drop-tracing-appender
    description: >
      Design doc listed tracing-appender as a dep but the init snippet used
      std::fs::OpenOptions with Mutex<File> directly. Dropped tracing-appender
      to keep deps minimal — its main value is rolling file rotation, which
      design explicitly deferred (YAGNI).
    rationale: Fewer deps, same result. 2 deps instead of 3.

  - id: silent-fallback-on-log-init-failure
    description: >
      init_logging() returns early (no-op) if the log file cannot be opened,
      rather than panicking. The server still works — just without logs.
    rationale: >
      MCP server startup failure due to a log file permission issue would be
      worse than silently running without logs. The server's function is
      unrelated to its own logging.
